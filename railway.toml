# Railway deploy config
# ─────────────────────
# Uses a Dockerfile at repo root. The Dockerfile's WORKDIR + CMD handle
# the runtime startup — we don't override startCommand here because
# Railway runs startCommand in exec mode (not shell mode), which fails
# on `cd /app/backend && ...` since `cd` isn't an executable.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
