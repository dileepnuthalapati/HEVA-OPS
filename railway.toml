[build]
builder = "nixpacks"
# Step-by-step:
# 1. npm install -g yarn        → guarantees yarn is on PATH (npm always is)
# 2. cd frontend && yarn ...     → installs node_modules + builds the React SPA
# 3. cd ../backend && pip ...    → installs Python deps
#
# REACT_APP_BACKEND_URL='' makes the frontend call itself (same-origin).
# The native APK bakes its own URL at build time and is unaffected.
buildCommand = "npm install -g yarn && cd frontend && yarn install --frozen-lockfile && REACT_APP_BACKEND_URL='' yarn build && cd ../backend && pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && uvicorn server:app --host 0.0.0.0 --port ${PORT:-5000}"
healthcheckPath = "/api/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
