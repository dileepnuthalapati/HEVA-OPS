# Railway deploy config
# ─────────────────────
# Uses a Dockerfile at repo root instead of Nixpacks auto-detection.
# Nixpacks fought monorepo layouts — Dockerfile is deterministic and
# matches Capacitor 8's Node 22 requirement exactly.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "cd /app/backend && uvicorn server:app --host 0.0.0.0 --port ${PORT:-5000}"
healthcheckPath = "/api/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
