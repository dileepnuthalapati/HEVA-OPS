# Nixpacks configuration for Heva One monorepo
#
# Declaring `providers = ["node", "python"]` is ENOUGH — nixpacks auto-installs
# Node.js and Python from them. Do NOT also list them under [phases.setup].nixPkgs —
# that causes a duplicate Python install and the build fails with a
# `python.pc file conflict` error.
#
# The actual build + start commands live in railway.toml.
# railway.toml's buildCommand runs `npm install -g yarn` explicitly so yarn is
# available regardless of whether nixpacks auto-detected the packageManager field.

providers = ["node", "python"]

[variables]
# React dev deps (webpack, babel, etc.) must be installed for `yarn build`.
NPM_CONFIG_PRODUCTION = "false"
YARN_PRODUCTION = "false"
# Larger heap for CRA webpack build (React app has many modules).
NODE_OPTIONS = "--max-old-space-size=2048"
