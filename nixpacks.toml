# Nixpacks configuration for Heva One monorepo
# Tells Railway/nixpacks that this project needs BOTH Node.js (for the React
# frontend build) and Python (for the FastAPI backend).
# The actual build and start commands are defined in railway.toml.

providers = ["node", "python"]

[variables]
# Force yarn over npm (package.json pins yarn as packageManager)
NPM_CONFIG_PRODUCTION = "false"
