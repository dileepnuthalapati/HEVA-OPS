# Nixpacks configuration for Heva One monorepo
#
# The Node.js provider AUTO-DETECTS based on a root-level package.json.
# Ours lives at frontend/package.json, so auto-detect fails and Node never
# gets installed. We force it explicitly here.
#
# The Python provider correctly auto-detects backend/requirements.txt and
# installs python3 + gcc without any help from us.
#
# yarn is the nixpkgs-provided binary (Yarn Classic 1.x), so it's on PATH
# immediately — no corepack / npm-global dance required.

providers = ["python"]

[phases.setup]
nixPkgs = ["nodejs_20", "yarn"]

[variables]
# React dev deps (webpack, babel, etc.) must be installed for `yarn build`.
NPM_CONFIG_PRODUCTION = "false"
YARN_PRODUCTION = "false"
# Larger heap for CRA webpack build (React app has many modules).
NODE_OPTIONS = "--max-old-space-size=2048"
