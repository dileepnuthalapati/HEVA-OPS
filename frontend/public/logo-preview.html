<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Heva ONE logo preview</title>
<style>
  body{background:#f1f5f9;font-family:system-ui,-apple-system,sans-serif;padding:40px;margin:0}
  h2{text-align:center;margin:0 0 32px;color:#0f172a}
  .grid{display:flex;gap:40px;justify-content:center;align-items:flex-start;flex-wrap:wrap}
  .card{text-align:center}
  .card img{border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.12);background:#6366F1}
  .label{font-weight:600;margin:0 0 12px;color:#334155}
  .meta{margin:8px 0 0;font-size:12px;color:#64748b}
</style></head>
<body>
  <h2>Heva ONE — logo preview</h2>
  <div class="grid">
    <div class="card">
      <p class="label">APK launcher (Android)</p>
      <img src="/apk-logo-preview.png" width="192" height="192" alt="APK logo">
      <p class="meta">192×192 · ic_launcher.png</p>
    </div>
    <div class="card">
      <p class="label">APK foreground only (transparent)</p>
      <img src="/apk-logo-foreground.png" width="192" height="192" alt="APK foreground">
      <p class="meta">432×432 · ic_launcher_foreground.png</p>
    </div>
    <div class="card">
      <p class="label">PWA (now synced to match APK)</p>
      <img src="/pwa-logo-preview.png" width="192" height="192" alt="PWA logo">
      <p class="meta">512×512 · icon-512.png</p>
    </div>
  </div>
</body></html>
